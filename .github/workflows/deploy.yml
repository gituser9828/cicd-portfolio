name: Deploy to EC2

on:
  push:
    branches:
      - main   # Q1

jobs:
  deploy:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v3

      - name: Deploy to EC2
        uses: appleboy/ssh-action@v1.0.0
        with:
          host: ${{ secrets.EC2_HOST }}         # Q2
          username: ${{ secrets.EC2_USERNAME }} # Q3
          key: ${{ secrets.EC2_SSH_KEY }}       # Q4

          script: |
            cd /var/www/html
            git pull origin main               # Q5
            sudo systemctl restart nginx
